<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoesHub Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<div id="nav-placeholder"></div>

<div class="max-w-7xl mx-auto px-4 py-8 flex-1 w-full">
  <!-- Admin nav -->
  <div class="flex gap-3 mb-6 text-sm font-medium">
    <a href="/admin/index.html" data-testid="admin-nav-dashboard" class="bg-yellow-400 text-gray-900 px-4 py-2 rounded-lg"
       data-i18n="admin.dashboard"></a>
    <a href="/admin/products.html" data-testid="admin-nav-products" class="bg-white px-4 py-2 rounded-lg hover:bg-gray-50 shadow-sm"
       data-i18n="admin.manageProducts"></a>
    <a href="/admin/orders.html" data-testid="admin-nav-orders" class="bg-white px-4 py-2 rounded-lg hover:bg-gray-50 shadow-sm"
       data-i18n="admin.manageOrders"></a>
  </div>

  <h1 class="text-2xl font-bold text-gray-800 mb-6">📊 <span data-i18n="admin.dashboard"></span></h1>

  <!-- Stats Cards -->
  <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8" data-testid="stats-grid">
    <div class="bg-white rounded-xl shadow p-5" data-testid="stat-total-orders">
      <p class="text-xs text-gray-400 uppercase" data-i18n="admin.stats.totalOrders"></p>
      <p id="stat-orders" class="text-3xl font-bold text-gray-800 mt-1">-</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5" data-testid="stat-pending-orders">
      <p class="text-xs text-gray-400 uppercase" data-i18n="admin.stats.pending"></p>
      <p id="stat-pending" class="text-3xl font-bold text-yellow-500 mt-1">-</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5" data-testid="stat-revenue">
      <p class="text-xs text-gray-400 uppercase" data-i18n="admin.stats.revenue"></p>
      <p id="stat-revenue" class="text-3xl font-bold text-green-600 mt-1">-</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5" data-testid="stat-products">
      <p class="text-xs text-gray-400 uppercase" data-i18n="admin.stats.products"></p>
      <p id="stat-products" class="text-3xl font-bold text-blue-600 mt-1">-</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5" data-testid="stat-users">
      <p class="text-xs text-gray-400 uppercase" data-i18n="admin.stats.users"></p>
      <p id="stat-users" class="text-3xl font-bold text-purple-600 mt-1">-</p>
    </div>
  </div>

  <!-- Recent Orders -->
  <div class="bg-white rounded-xl shadow overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
      <h2 class="font-bold text-gray-800" data-i18n="admin.stats.recent"></h2>
      <a href="/admin/orders.html" class="text-yellow-600 text-sm hover:text-yellow-700"
         data-i18n="admin.stats.viewAll"></a>
    </div>
    <div id="recent-orders" data-testid="recent-orders" class="overflow-x-auto">
      <div class="text-center py-10 text-gray-400" data-i18n="loading"></div>
    </div>
  </div>
</div>

<footer class="bg-gray-900 text-gray-400 text-center py-6 text-sm mt-auto">
  <span data-i18n="footer.admin"></span>
</footer>

<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  async function loadDashboard() {
    const stats = await api.getAdminStats();
    document.getElementById('stat-orders').textContent  = stats.total_orders;
    document.getElementById('stat-pending').textContent = stats.pending_orders;
    document.getElementById('stat-revenue').textContent = formatPrice(stats.total_revenue);
    document.getElementById('stat-products').textContent = stats.total_products;
    document.getElementById('stat-users').textContent   = stats.total_users;

    const recentEl = document.getElementById('recent-orders');
    if (stats.recent_orders.length === 0) {
      recentEl.innerHTML = `<p class="text-center py-8 text-gray-400">${i18n.t('admin.noOrders')}</p>`;
      return;
    }
    recentEl.innerHTML = `
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
          <tr>
            <th class="py-3 px-4 text-left">${i18n.t('admin.col.order')}</th>
            <th class="py-3 text-left">${i18n.t('admin.col.user')}</th>
            <th class="py-3 text-left">${i18n.t('admin.col.date')}</th>
            <th class="py-3 text-right px-4">${i18n.t('admin.col.total')}</th>
            <th class="py-3 text-center">${i18n.t('admin.col.status')}</th>
          </tr>
        </thead>
        <tbody>
          ${stats.recent_orders.map(o => `
            <tr class="border-t border-gray-100 hover:bg-gray-50">
              <td class="py-3 px-4">
                <a href="/order-detail.html?id=${o.id}" class="text-yellow-600 font-semibold hover:underline">#${o.id}</a>
              </td>
              <td class="py-3">${o.username}</td>
              <td class="py-3">${formatDate(o.created_at)}</td>
              <td class="py-3 text-right px-4 font-medium">${formatPrice(o.total_amount)}</td>
              <td class="py-3 text-center">
                <span class="px-2 py-1 rounded-full text-xs font-semibold ${getStatusClass(o.status)}">${getStatusLabel(o.status)}</span>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  (async () => {
    i18n.apply();
    if (!auth.requireAdmin()) return;
    await renderNav();
    await loadDashboard();
  })();
</script>
</body>
</html>
