<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoesHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<div id="nav-placeholder"></div>

<main class="max-w-6xl mx-auto px-4 py-10 flex-1 w-full">
  <!-- Breadcrumb -->
  <nav class="text-sm text-gray-400 mb-6">
    <a href="/" class="hover:text-gray-700" data-i18n="nav.home"></a> /
    <a href="/products.html" class="hover:text-gray-700" data-i18n="nav.products"></a> /
    <span id="breadcrumb-name" class="text-gray-700">...</span>
  </nav>

  <div id="product-detail" data-testid="product-detail">
    <div class="text-center py-20 text-gray-400" data-i18n="loading"></div>
  </div>
</main>

<footer class="bg-gray-900 text-gray-400 text-center py-6 text-sm mt-auto">
  <span data-i18n="footer.copy"></span>
</footer>

<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let selectedSize = '';

  function renderProduct(p) {
    document.title = `${p.name} – ShoesHub`;
    document.getElementById('breadcrumb-name').textContent = p.name;

    const sizesHtml = p.sizes.length
      ? `<div class="mt-4">
           <p class="text-sm font-medium text-gray-700 mb-2">${i18n.t('product.selectSize')}</p>
           <div class="flex flex-wrap gap-2" data-testid="size-selector">
             ${p.sizes.map(s => `
               <button onclick="selectSize('${s}', this)" data-testid="size-option" data-size="${s}"
                       class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:border-yellow-400 hover:bg-yellow-50 transition-colors">
                 ${s}
               </button>`).join('')}
           </div>
           <p id="size-error" data-testid="size-error" class="text-red-500 text-sm mt-1 hidden">${i18n.t('product.sizeError')}</p>
         </div>`
      : '';

    const stockBadge = p.stock === 0
      ? `<span class="text-red-500 font-medium">${i18n.t('product.outOfStock')}</span>`
      : p.stock <= 5
        ? `<span class="text-orange-500 font-medium">${i18n.t('product.lowStock', p.stock)}</span>`
        : `<span class="text-green-600 font-medium">${i18n.t('product.inStock', p.stock)}</span>`;

    document.getElementById('product-detail').innerHTML = `
      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <div class="grid md:grid-cols-2 gap-0">
          <!-- Image -->
          <div class="bg-gray-100 flex items-center justify-center p-8 min-h-80">
            <img data-testid="product-image"
                 src="${p.image_url || 'https://picsum.photos/seed/' + p.id + '/600/400'}"
                 alt="${p.name}" class="max-h-80 object-contain rounded-xl" />
          </div>

          <!-- Info -->
          <div class="p-8 flex flex-col">
            <p data-testid="product-brand" class="text-sm text-gray-400 uppercase tracking-widest font-medium">${p.brand || ''}</p>
            <h1 data-testid="product-name" class="text-3xl font-bold text-gray-900 mt-1">${p.name}</h1>
            <p data-testid="product-category" class="text-sm text-gray-400 mt-1">${p.category_name || ''}</p>

            <p data-testid="product-price" class="text-4xl font-extrabold text-yellow-500 mt-4">${formatPrice(p.price)}</p>

            <div data-testid="product-stock" class="mt-2 text-sm">${stockBadge}</div>

            <p data-testid="product-description" class="text-gray-600 mt-4 leading-relaxed">${p.description || i18n.t('product.noDescription')}</p>

            ${sizesHtml}

            <!-- Quantity -->
            <div class="mt-4 flex items-center gap-3">
              <label class="text-sm font-medium text-gray-700">${i18n.t('product.quantity')}</label>
              <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden">
                <button onclick="changeQty(-1)" data-testid="qty-decrease"
                        class="px-3 py-2 hover:bg-gray-100 font-bold text-lg">−</button>
                <input id="qty-input" data-testid="qty-input" type="number" value="1" min="1"
                       class="w-14 text-center py-2 border-x border-gray-300 focus:outline-none" readonly />
                <button onclick="changeQty(1)" data-testid="qty-increase"
                        class="px-3 py-2 hover:bg-gray-100 font-bold text-lg">+</button>
              </div>
            </div>

            <!-- Add to Cart -->
            <button id="add-to-cart-btn" data-testid="add-to-cart-btn" onclick="addToCart()"
                    ${p.stock === 0 ? 'disabled' : ''}
                    class="mt-6 w-full bg-yellow-400 text-gray-900 py-4 rounded-xl font-bold text-lg
                           hover:bg-yellow-300 active:bg-yellow-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
              ${p.stock === 0 ? i18n.t('product.outOfStock') : i18n.t('product.addToCart')}
            </button>

            <a href="/products.html" class="mt-3 text-center text-sm text-gray-400 hover:text-gray-600">${i18n.t('product.back')}</a>
          </div>
        </div>
      </div>`;
  }

  function selectSize(size, btn) {
    document.querySelectorAll('[data-testid="size-option"]').forEach(b => {
      b.classList.remove('bg-yellow-400', 'text-gray-900', 'border-yellow-400', 'font-semibold');
      b.classList.add('border-gray-300');
    });
    btn.classList.add('bg-yellow-400', 'text-gray-900', 'border-yellow-400', 'font-semibold');
    btn.classList.remove('border-gray-300');
    selectedSize = size;
    document.getElementById('size-error')?.classList.add('hidden');
  }

  function changeQty(delta) {
    const input = document.getElementById('qty-input');
    const newVal = Math.max(1, parseInt(input.value) + delta);
    input.value = newVal;
  }

  async function addToCart() {
    if (!auth.requireLogin()) return;
    const hasSizes = document.querySelector('[data-testid="size-selector"]');
    if (hasSizes && !selectedSize) {
      document.getElementById('size-error').classList.remove('hidden');
      return;
    }
    const qty = parseInt(document.getElementById('qty-input').value);
    const btn = document.getElementById('add-to-cart-btn');
    btn.disabled = true;
    btn.textContent = i18n.t('product.adding');
    try {
      await api.addToCart({ product_id: parseInt(productId), quantity: qty, size: selectedSize });
      showToast(i18n.t('product.addedToCart'));
      await renderNav();
    } catch (e) {
      showToast(e.detail || i18n.t('error.generic'), 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = i18n.t('product.addToCart');
    }
  }

  (async () => {
    i18n.apply();
    await renderNav();
    if (!productId) { window.location.href = '/products.html'; return; }
    try {
      const p = await api.getProduct(productId);
      renderProduct(p);
    } catch (e) {
      document.getElementById('product-detail').innerHTML =
        `<div class="text-center py-20 text-red-400" data-testid="product-not-found">${i18n.t('product.notFound')}</div>`;
    }
  })();
</script>
</body>
</html>
