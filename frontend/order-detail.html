<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoesHub</title>
  <link rel="stylesheet" href="/css/themes.css">
  <script src="/js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      primary: { 50: 'rgb(var(--p-50) / <alpha-value>)', 100: 'rgb(var(--p-100) / <alpha-value>)', 300: 'rgb(var(--p-300) / <alpha-value>)', 400: 'rgb(var(--p-400) / <alpha-value>)', 500: 'rgb(var(--p-500) / <alpha-value>)', 600: 'rgb(var(--p-600) / <alpha-value>)', 700: 'rgb(var(--p-700) / <alpha-value>)' },
      'on-primary': 'rgb(var(--p-text) / <alpha-value>)',
    }}}}
  </script>
</head>
<body class="min-h-screen flex flex-col">

<div id="nav-placeholder"></div>

<main class="max-w-3xl mx-auto px-4 py-10 flex-1 w-full">
  <!-- Success banner (shown after checkout) -->
  <div id="success-banner" data-testid="order-success-banner"
       class="hidden bg-green-50 border border-green-300 rounded-xl p-5 mb-6 text-center">
    <div class="text-4xl mb-2">🎉</div>
    <h2 class="text-xl font-bold text-green-700" data-i18n="order.success.title"></h2>
    <p class="text-green-600 mt-1" data-i18n="order.success.subtitle"></p>
  </div>

  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800" data-i18n="order.title"></h1>
    <a href="/orders.html" class="text-primary-600 hover:text-primary-700 text-sm font-medium"
       data-i18n="order.back"></a>
  </div>

  <div id="order-detail" data-testid="order-detail">
    <div class="text-center py-20 text-gray-400" data-i18n="loading"></div>
  </div>
</main>

<footer class="bg-gray-900 text-gray-400 text-center py-6 text-sm mt-auto">
  <span data-i18n="footer.copy"></span>
</footer>

<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  const params  = new URLSearchParams(window.location.search);
  const orderId = params.get('id');

  function renderOrder(order) {
    const paymentLabels = {
      credit_card:   i18n.t('order.payment.creditCard'),
      bank_transfer: i18n.t('order.payment.bankTransfer'),
      cod:           i18n.t('order.payment.cod'),
    };

    document.getElementById('order-detail').innerHTML = `
      <div class="space-y-4">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow p-5 flex flex-wrap gap-4 justify-between">
          <div>
            <p class="text-xs text-gray-400 uppercase">${i18n.t('order.number')}</p>
            <p data-testid="order-id" class="text-2xl font-bold text-gray-800">#${order.id}</p>
          </div>
          <div>
            <p class="text-xs text-gray-400 uppercase">${i18n.t('order.date')}</p>
            <p data-testid="order-date" class="font-medium">${formatDate(order.created_at)}</p>
          </div>
          <div>
            <p class="text-xs text-gray-400 uppercase">${i18n.t('order.status')}</p>
            <span data-testid="order-status"
                  class="inline-block mt-1 px-4 py-1.5 rounded-full text-sm font-semibold ${getStatusClass(order.status)}">
              ${getStatusLabel(order.status)}
            </span>
          </div>
        </div>

        <!-- Items -->
        <div class="bg-white rounded-xl shadow p-5">
          <h3 class="font-bold text-gray-800 mb-4">${i18n.t('order.items.title')}</h3>
          <div class="space-y-3" data-testid="order-items">
            ${order.items.map(i => `
              <div class="flex justify-between items-center py-2 border-b last:border-b-0" data-testid="order-item">
                <div>
                  <p class="font-medium text-gray-800">${i.product_name}</p>
                  ${i.size ? `<p class="text-sm text-gray-400">${i18n.t('order.size')} ${i.size}</p>` : ''}
                  <p class="text-sm text-gray-400">${i18n.t('order.qty')} ${i.quantity}</p>
                </div>
                <div class="text-right">
                  <p class="text-sm text-gray-400">${formatPrice(i.price)} × ${i.quantity}</p>
                  <p class="font-semibold text-gray-800">${formatPrice(i.price * i.quantity)}</p>
                </div>
              </div>`).join('')}
          </div>
          <div class="mt-4 pt-4 border-t flex justify-between font-bold text-lg">
            <span>${i18n.t('order.total')}</span>
            <span data-testid="order-total" class="text-primary-600">${formatPrice(order.total_amount)}</span>
          </div>
        </div>

        <!-- Shipping Info -->
        <div class="bg-white rounded-xl shadow p-5">
          <h3 class="font-bold text-gray-800 mb-3">${i18n.t('order.shipping.title')}</h3>
          <div class="text-gray-600 space-y-1 text-sm" data-testid="shipping-info">
            <p data-testid="shipping-name" class="font-medium text-gray-800">${order.shipping_name || '-'}</p>
            <p data-testid="shipping-address">${order.shipping_address || '-'}</p>
            <p>${order.shipping_city || ''} ${order.shipping_postal || ''}</p>
            <p data-testid="shipping-phone">📞 ${order.shipping_phone || '-'}</p>
          </div>
        </div>

        <!-- Payment -->
        <div class="bg-white rounded-xl shadow p-5">
          <h3 class="font-bold text-gray-800 mb-3">${i18n.t('order.payment.title')}</h3>
          <p data-testid="payment-method" class="text-gray-600">${paymentLabels[order.payment_method] || order.payment_method}</p>
        </div>

        <div class="text-center">
          <a href="/products.html"
             class="inline-block bg-primary-400 text-on-primary px-8 py-3 rounded-full font-semibold hover:bg-primary-300 transition-colors">
            ${i18n.t('order.continueShopping')}
          </a>
        </div>
      </div>`;
  }

  (async () => {
    i18n.apply();
    if (!auth.requireLogin()) return;
    await renderNav();

    if (new URLSearchParams(window.location.search).get('success')) {
      document.getElementById('success-banner').classList.remove('hidden');
    }

    if (!orderId) { window.location.href = '/orders.html'; return; }
    try {
      const order = await api.getOrder(orderId);
      renderOrder(order);
    } catch (e) {
      document.getElementById('order-detail').innerHTML =
        `<div class="text-center py-20 text-red-400" data-testid="order-not-found">${i18n.t('order.notFound')}</div>`;
    }
  })();
</script>
</body>
</html>
