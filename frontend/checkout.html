<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoesHub</title>
  <link rel="stylesheet" href="/css/themes.css">
  <script src="/js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      primary: { 50: 'rgb(var(--p-50) / <alpha-value>)', 100: 'rgb(var(--p-100) / <alpha-value>)', 300: 'rgb(var(--p-300) / <alpha-value>)', 400: 'rgb(var(--p-400) / <alpha-value>)', 500: 'rgb(var(--p-500) / <alpha-value>)', 600: 'rgb(var(--p-600) / <alpha-value>)', 700: 'rgb(var(--p-700) / <alpha-value>)' },
      'on-primary': 'rgb(var(--p-text) / <alpha-value>)',
    }}}}
  </script>
</head>
<body class="min-h-screen flex flex-col">

<div id="nav-placeholder"></div>

<main class="max-w-5xl mx-auto px-4 py-10 flex-1 w-full">
  <h1 class="text-3xl font-bold text-gray-800 mb-8" data-i18n="checkout.title"></h1>

  <div class="grid lg:grid-cols-3 gap-8">
    <!-- Form -->
    <div class="lg:col-span-2">
      <form id="checkout-form" data-testid="checkout-form" onsubmit="placeOrder(event)" novalidate>

        <!-- Shipping Info -->
        <div class="bg-white rounded-2xl shadow p-6 mb-6">
          <h2 class="text-lg font-bold text-gray-800 mb-4" data-i18n="checkout.shipping.title"></h2>
          <div class="grid sm:grid-cols-2 gap-4">
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="checkout.shipping.name"></label>
              <input id="shipping-name" data-testid="shipping-name" name="shipping_name" type="text"
                     required data-i18n-placeholder="checkout.shipping.name.ph"
                     class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="checkout.shipping.address"></label>
              <input id="shipping-address" data-testid="shipping-address" name="shipping_address" type="text"
                     required data-i18n-placeholder="checkout.shipping.address.ph"
                     class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="checkout.shipping.city"></label>
              <input id="shipping-city" data-testid="shipping-city" name="shipping_city" type="text"
                     required data-i18n-placeholder="checkout.shipping.city.ph"
                     class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="checkout.shipping.postal"></label>
              <input id="shipping-postal" data-testid="shipping-postal" name="shipping_postal" type="text"
                     required data-i18n-placeholder="checkout.shipping.postal.ph"
                     class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="checkout.shipping.phone"></label>
              <input id="shipping-phone" data-testid="shipping-phone" name="shipping_phone" type="tel"
                     required data-i18n-placeholder="checkout.shipping.phone.ph"
                     class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-400" />
            </div>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="bg-white rounded-2xl shadow p-6 mb-6">
          <h2 class="text-lg font-bold text-gray-800 mb-4" data-i18n="checkout.payment.title"></h2>
          <div class="space-y-3" data-testid="payment-methods">
            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-xl cursor-pointer hover:border-primary-400 transition-colors has-[:checked]:border-primary-400 has-[:checked]:bg-primary-50">
              <input type="radio" name="payment_method" value="credit_card" checked
                     data-testid="payment-credit-card" class="text-primary-500" />
              <span class="text-2xl">💳</span>
              <div>
                <div class="font-medium" data-i18n="checkout.payment.creditCard"></div>
                <div class="text-xs text-gray-400" data-i18n="checkout.payment.creditCard.sub"></div>
              </div>
            </label>
            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-xl cursor-pointer hover:border-primary-400 transition-colors has-[:checked]:border-primary-400 has-[:checked]:bg-primary-50">
              <input type="radio" name="payment_method" value="bank_transfer"
                     data-testid="payment-bank-transfer" class="text-primary-500" />
              <span class="text-2xl">🏦</span>
              <div>
                <div class="font-medium" data-i18n="checkout.payment.bankTransfer"></div>
                <div class="text-xs text-gray-400" data-i18n="checkout.payment.bankTransfer.sub"></div>
              </div>
            </label>
            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-xl cursor-pointer hover:border-primary-400 transition-colors has-[:checked]:border-primary-400 has-[:checked]:bg-primary-50">
              <input type="radio" name="payment_method" value="cod"
                     data-testid="payment-cod" class="text-primary-500" />
              <span class="text-2xl">💵</span>
              <div>
                <div class="font-medium" data-i18n="checkout.payment.cod"></div>
                <div class="text-xs text-gray-400" data-i18n="checkout.payment.cod.sub"></div>
              </div>
            </label>
          </div>
        </div>

        <!-- Discount Code -->
        <div class="bg-white rounded-2xl shadow p-6 mb-6">
          <h2 class="text-lg font-bold text-gray-800 mb-4" data-i18n="checkout.discount.title"></h2>
          <div class="flex gap-2">
            <input id="discount-input" data-testid="discount-code-input" type="text"
                   data-i18n-placeholder="checkout.discount.placeholder"
                   class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-400 uppercase" />
            <button id="discount-btn" data-testid="apply-discount-btn" type="button" onclick="applyDiscount()"
                    class="bg-primary-400 text-on-primary px-5 py-2.5 rounded-lg font-semibold hover:bg-primary-300 transition-colors"
                    data-i18n="checkout.discount.apply"></button>
          </div>
          <p id="discount-msg" data-testid="discount-message" class="text-sm mt-2 hidden"></p>
        </div>

        <p id="form-error" data-testid="form-error" class="text-red-500 text-sm mb-3 hidden"></p>

        <button type="submit" id="submit-btn" data-testid="place-order-btn"
                class="w-full bg-primary-400 text-on-primary py-4 rounded-xl font-bold text-lg hover:bg-primary-300 transition-colors disabled:opacity-50"
                data-i18n="checkout.submit"></button>
      </form>
    </div>

    <!-- Order Summary -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-2xl shadow p-6 sticky top-20">
        <h2 class="text-lg font-bold text-gray-800 mb-4" data-i18n="checkout.summary.title"></h2>
        <div id="order-summary" data-testid="order-summary">
          <div class="text-center text-gray-400 py-4" data-i18n="loading"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="bg-gray-900 text-gray-400 text-center py-6 text-sm mt-auto">
  <span data-i18n="footer.copy"></span>
</footer>

<script src="/js/i18n.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  let cartData = null;
  let appliedDiscount = null;

  function calcDiscountAmount(subtotal) {
    if (!appliedDiscount) return 0;
    if (appliedDiscount.discount_type === 'percentage') {
      return Math.min(subtotal * appliedDiscount.discount_value / 100, subtotal);
    }
    return Math.min(appliedDiscount.discount_value, subtotal);
  }

  function renderSummary() {
    if (!cartData) return;
    const subtotal = cartData.total;
    const discountAmt = calcDiscountAmount(subtotal);
    const total = Math.max(0, subtotal - discountAmt);
    const summary = document.getElementById('order-summary');
    summary.innerHTML = `
      <div class="space-y-3">
        ${cartData.items.map(i => `
          <div class="flex justify-between text-sm">
            <div>
              <span class="font-medium">${i.name}</span>
              ${i.size ? `<span class="text-gray-400"> (${i.size})</span>` : ''}
              <span class="text-gray-400"> ×${i.quantity}</span>
            </div>
            <span>${formatPrice(i.subtotal)}</span>
          </div>`).join('')}
      </div>
      <div class="border-t mt-4 pt-4 space-y-1">
        <div class="flex justify-between text-sm text-gray-500">
          <span>${i18n.t('checkout.summary.shipping')}</span>
          <span class="text-green-600">${i18n.t('checkout.summary.free')}</span>
        </div>
        ${discountAmt > 0 ? `
        <div class="flex justify-between text-sm text-green-600" data-testid="discount-line">
          <span>${i18n.t('checkout.summary.discount')} (${appliedDiscount.code})</span>
          <span>-${formatPrice(discountAmt)}</span>
        </div>` : ''}
        <div class="flex justify-between font-bold text-lg pt-1 border-t">
          <span>${i18n.t('checkout.summary.total')}</span>
          <span data-testid="checkout-total" class="text-primary-600">${formatPrice(total)}</span>
        </div>
      </div>`;
  }

  async function loadOrderSummary() {
    const summary = document.getElementById('order-summary');
    try {
      cartData = await api.getCart();
      if (cartData.items.length === 0) {
        window.location.href = '/cart.html';
        return;
      }
      renderSummary();
    } catch (e) {
      summary.innerHTML = `<p class="text-red-400 text-sm">${e.detail || i18n.t('error.generic')}</p>`;
    }
  }

  async function applyDiscount() {
    const code = document.getElementById('discount-input').value.trim().toUpperCase();
    const msg  = document.getElementById('discount-msg');
    const btn  = document.getElementById('discount-btn');
    if (!code) return;

    btn.disabled = true;
    btn.textContent = i18n.t('checkout.discount.applying');
    msg.className = 'text-sm mt-2';
    msg.classList.remove('hidden');
    msg.textContent = i18n.t('checkout.discount.applying');

    try {
      const dc = await api.validateDiscount(code);
      appliedDiscount = dc;
      const subtotal = cartData ? cartData.total : 0;
      const amt = calcDiscountAmount(subtotal);
      msg.textContent = i18n.t('checkout.discount.applied', formatPrice(amt));
      msg.className = 'text-sm mt-2 text-green-600';
      document.getElementById('discount-input').disabled = true;
      btn.textContent = i18n.t('checkout.discount.remove');
      btn.onclick = removeDiscount;
      btn.disabled = false;
      renderSummary();
    } catch (ex) {
      appliedDiscount = null;
      msg.textContent = ex.detail || i18n.t('checkout.discount.invalid');
      msg.className = 'text-sm mt-2 text-red-500';
      btn.textContent = i18n.t('checkout.discount.apply');
      btn.onclick = applyDiscount;
      btn.disabled = false;
    }
  }

  function removeDiscount() {
    appliedDiscount = null;
    const input = document.getElementById('discount-input');
    const msg   = document.getElementById('discount-msg');
    const btn   = document.getElementById('discount-btn');
    input.value    = '';
    input.disabled = false;
    msg.classList.add('hidden');
    btn.textContent = i18n.t('checkout.discount.apply');
    btn.onclick = applyDiscount;
    renderSummary();
  }

  async function placeOrder(e) {
    e.preventDefault();
    const form = e.target;
    const errEl = document.getElementById('form-error');
    errEl.classList.add('hidden');

    const fields = ['shipping-name', 'shipping-address', 'shipping-city', 'shipping-postal', 'shipping-phone'];
    for (const id of fields) {
      if (!document.getElementById(id).value.trim()) {
        errEl.textContent = i18n.t('checkout.error.required');
        errEl.classList.remove('hidden');
        document.getElementById(id).focus();
        return;
      }
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = i18n.t('checkout.submitting');

    const payload = {
      shipping_name:    document.getElementById('shipping-name').value.trim(),
      shipping_address: document.getElementById('shipping-address').value.trim(),
      shipping_city:    document.getElementById('shipping-city').value.trim(),
      shipping_postal:  document.getElementById('shipping-postal').value.trim(),
      shipping_phone:   document.getElementById('shipping-phone').value.trim(),
      payment_method:   form.querySelector('input[name="payment_method"]:checked').value,
    };
    if (appliedDiscount) payload.discount_code = appliedDiscount.code;

    try {
      const order = await api.placeOrder(payload);
      window.location.href = `/order-detail.html?id=${order.id}&success=1`;
    } catch (ex) {
      errEl.textContent = ex.detail || i18n.t('error.generic');
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = i18n.t('checkout.submit');
    }
  }

  (async () => {
    i18n.apply();
    if (!auth.requireLogin()) return;
    await renderNav();
    await Promise.all([loadOrderSummary(), prefillFromProfile()]);
  })();

  async function prefillFromProfile() {
    try {
      const user = await api.me();
      if (user.default_shipping_name)    document.getElementById('shipping-name').value    = user.default_shipping_name;
      if (user.default_shipping_address) document.getElementById('shipping-address').value = user.default_shipping_address;
      if (user.default_shipping_city)    document.getElementById('shipping-city').value    = user.default_shipping_city;
      if (user.default_shipping_postal)  document.getElementById('shipping-postal').value  = user.default_shipping_postal;
      if (user.default_shipping_phone)   document.getElementById('shipping-phone').value   = user.default_shipping_phone;
      if (user.default_payment_method) {
        const radio = document.querySelector(`input[name="payment_method"][value="${user.default_payment_method}"]`);
        if (radio) radio.checked = true;
      }
    } catch { /* not critical */ }
  }
</script>
</body>
</html>
